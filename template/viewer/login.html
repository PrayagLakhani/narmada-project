<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer Access - Narmada Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 400: '#3b5ba5', 700: '#1f3c88', 900: '#16306d' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-brand-700 to-brand-400 flex items-center justify-center min-h-screen font-sans antialiased text-gray-800 p-4 relative overflow-hidden">

  <!-- Background decorations -->
  <div class="absolute top-10 left-10 w-96 h-96 bg-white opacity-10 mix-blend-overlay rounded-full z-0"></div>
  <div class="absolute bottom-10 right-20 w-96 h-96 bg-brand-900 opacity-20 mix-blend-overlay rounded-full z-0"></div>

  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl border border-gray-100 p-8 z-10 relative">
    
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-cyan-50 text-cyan-700 mb-4 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Viewer Access</h2>
      <p class="text-gray-500 text-sm mt-2">Login with your email via OTP</p>
    </div>

    <!-- STEP 1: EMAIL -->
    {% if not otp_sent %}
    <form method="POST" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input type="email" name="email" class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-brand-700 focus:border-brand-700 text-sm transition-colors" placeholder="viewer@example.com" required>
      </div>
      <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-md text-sm font-medium text-white bg-brand-700 hover:bg-brand-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-700 transition-colors mt-2">
        Send OTP
      </button>
    </form>
    {% endif %}

    <!-- STEP 2: OTP -->
    {% if otp_sent %}
    <form method="POST" class="space-y-5">
      <div class="p-3 bg-blue-50 text-blue-800 rounded-lg text-sm mb-4 border border-blue-100">
        We've sent a One-Time Password to your email.
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Enter OTP</label>
        <input type="text" name="otp" class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-brand-700 focus:border-brand-700 text-sm transition-colors text-center tracking-widest font-mono text-lg" placeholder="123456" required>
      </div>
      <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-md text-sm font-medium text-white bg-brand-700 hover:bg-brand-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-700 transition-colors mt-2">
        Verify & Login
      </button>
    </form>
    {% endif %}

    <!-- MESSAGES -->
    <div class="mt-4">
      {% if error %}
      <div class="flex items-center p-3 text-sm text-red-800 rounded-lg bg-red-50" role="alert">
        <span class="font-medium">{{ error }}</span>
      </div>
      {% endif %}
    </div>
    
    <div class="mt-6 text-center">
      <a href="/" class="text-sm text-brand-700 hover:text-brand-900 font-medium flex items-center justify-center gap-1 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
        Back to Portal Select
      </a>
    </div>
    
  </div>

</body>
</html>
