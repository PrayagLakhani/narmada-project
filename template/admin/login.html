<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Narmada Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 400: '#3b5ba5', 700: '#1f3c88', 900: '#16306d' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-brand-700 to-brand-400 flex items-center justify-center min-h-screen font-sans antialiased text-gray-800 p-4 relative overflow-hidden">

  <!-- Background decorations -->
  <div class="absolute top-10 left-10 w-96 h-96 bg-white opacity-10 mix-blend-overlay rounded-full z-0"></div>
  <div class="absolute bottom-10 right-20 w-96 h-96 bg-brand-900 opacity-20 mix-blend-overlay rounded-full z-0"></div>

  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl border border-gray-100 p-8 z-10 relative">
    
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-50 text-indigo-700 mb-4 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
      </div>
      <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Admin Login</h2>
      <p class="text-gray-500 text-sm mt-2">Sign in to administrator access</p>
    </div>

    <!-- ADMIN LOGIN FORM -->
    <form method="POST" action="/admin/login" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="email" class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-brand-700 focus:border-brand-700 text-sm transition-colors" placeholder="admin_username" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-brand-700 focus:border-brand-700 text-sm transition-colors" placeholder="••••••••" required>
      </div>
      <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-md text-sm font-medium text-white bg-brand-700 hover:bg-brand-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-700 transition-colors mt-2">Sign In</button>
    </form>

    <!-- MESSAGES -->
    <div class="mt-4">
      {% if error %}
      <div class="flex items-center p-3 text-sm text-red-800 rounded-lg bg-red-50" role="alert">
        <span class="font-medium">{{ error }}</span>
      </div>
      {% endif %}
    </div>
    
    <div class="mt-6 text-center">
      <a href="/" class="text-sm text-brand-700 hover:text-brand-900 font-medium flex items-center justify-center gap-1 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
        Back to Portal Select
      </a>
    </div>
    
  </div>

</body>
</html>
