<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Testing Data - Narmada Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 400: '#3b5ba5', 700: '#1f3c88', 900: '#16306d' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen font-sans antialiased text-gray-800 relative overflow-hidden">

  <!-- Background decorations (matched to login pages) -->
  <div class="fixed inset-0 bg-gradient-to-br from-brand-700 to-brand-400 z-0"></div>
  <div class="absolute top-10 left-10 w-64 h-64 bg-white opacity-10 mix-blend-overlay rounded-full z-0"></div>
  <div class="absolute top-40 right-20 w-80 h-80 bg-brand-900 opacity-20 mix-blend-overlay rounded-full z-0"></div>

  <!-- Navbar layered over background -->
  <div class="w-full flex justify-between items-center p-6 z-10 relative">
    <h1 class="text-white font-bold text-xl tracking-wide">Admin Portal</h1>
    <a href="/admin/home" class="text-white hover:text-gray-200 text-sm font-medium transition-colors flex items-center justify-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
      Back to Dashboard
    </a>
  </div>

  <!-- Main Login-style Form Card -->
  <div class="flex-grow flex items-center justify-center p-4 z-10 relative">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl border border-gray-100 p-8 max-h-[calc(100vh-7rem)] overflow-y-auto">
      
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-50 text-indigo-700 mb-4 shadow-sm flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Upload Testing Data</h2>
        <p class="text-gray-500 text-sm mt-2">Upload CSV, LULC raster, and POP raster testing inputs.</p>
      </div>

      <!-- FORM -->
      <form id="uploadForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">CSV File</label>
          <input type="file" name="csvFiles" accept=".csv" multiple class="block w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-colors" >
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">LULC Raster (.tif)</label>
          <input type="file" name="lulcFiles" accept=".tif" multiple class="block w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-colors" >
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">POP Raster (.tif)</label>
          <input type="file" name="popFiles" accept=".tif" multiple class="block w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-colors" >
        </div>
         
        <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-md text-sm font-medium text-white bg-brand-700 hover:bg-brand-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-700 transition-colors mt-2">Upload & Process</button>
        <button type="button" id="clearDirBtn" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-md text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-600 transition-colors">Clear Directory</button>


      </form>

      <p id="status" class="mt-6 text-sm font-medium text-center"></p>

    </div>
  </div>

<script>
document.getElementById("uploadForm").onsubmit = async (e) => {
  e.preventDefault();

  const status = document.getElementById("status");
  status.style.color = "black";
  status.innerText = "Uploading...";

  const csvFiles = e.target.csvFiles.files;
  const lulcFiles = e.target.lulcFiles.files;
  const popFiles = e.target.popFiles.files;

  async function uploadFiles(files, uploadType) {
    for (let i = 0; i < files.length; i++) {
      const formData = new FormData();
      formData.append("file", files[i]);
      formData.append("upload_type", uploadType);

      const res = await fetch("/api/admin-upload-testing-data", {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Upload failed");
    }
  }

  try {
    await uploadFiles(csvFiles, "csv");
    await uploadFiles(lulcFiles, "lulc");
    await uploadFiles(popFiles, "pop");

    status.style.color = "green";
    status.innerText = "✅ All files uploaded successfully. Processing...";

    const runRes = await fetch("/run", {
      method: "POST"
    });

    if (!runRes.ok) {
      let errorMessage = "Pipeline run failed";
      try {
        const errData = await runRes.json();
        errorMessage = errData.error || errorMessage;
        if (errData.details) {
          errorMessage += ": " + errData.details;
        }
      } catch (_) {
        // keep default error message
      }
      throw new Error(errorMessage);
    }
    let runData = {};
    try {
      runData = await runRes.json();
    } catch (_) {
      // fallback to default route
    }

    window.location.href = runData.redirect || "/admin/output";

  } catch (err) {
    status.style.color = "red";
    status.innerText = "❌ " + err.message;
  }
};

document.getElementById("clearDirBtn").onclick = async () => {
  const status = document.getElementById("status");

  if (!confirm("Clear all files in admin testing input directory?")) {
    return;
  }

  status.style.color = "black";
  status.innerText = "Clearing directory...";

  try {
    const res = await fetch("/admin/clear/testing", { method: "POST" });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Failed to clear directory");

    status.style.color = "green";
    status.innerText = "✅ Testing directory cleared successfully";
  } catch (err) {
    status.style.color = "red";
    status.innerText = "❌ " + err.message;
  }
};
</script>
</body>
</html>
